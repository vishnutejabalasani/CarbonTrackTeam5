spring.application.name=eco-tracker-backend

# ==========================================
# PostgreSQL Database Connection Settings
# ==========================================
# The database URL (change 'ecotracker' if you name your database differently)
spring.datasource.url=jdbc:postgresql://localhost:5432/ecotracker
spring.datasource.username=postgres
# REPLACE 'your_password_here' with the password you set during PostgreSQL installation
spring.datasource.password=Vishnu@123
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate Configurations
# ==========================================
# 'validate' checks the database schema against entities without altering it (managed by Flyway)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Flyway Configurations
# ==========================================
# Enable Flyway database migrations
spring.flyway.enabled=true
# Clean database before migration (useful for development)
spring.flyway.clean-disabled=false
