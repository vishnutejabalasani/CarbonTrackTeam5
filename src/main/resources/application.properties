spring.application.name=carbontrack-backend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/carbontrackdb?stringtype=unspecified
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configurations
app.jwt.secret=${JWT_SECRET:CarbonTrackSecretKeyCarbonTrackSecretKey12345}
app.jwt.expiration-ms=86400000

# Flyway
spring.flyway.baseline-on-migrate=true
# Security Logging
logging.level.org.springframework.security=DEBUG

# Cache Configurations (set to 'simple' for in-memory caching without Redis; set to 'redis' if Redis server is running)
spring.cache.type=simple
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# Enable developer login bypass locally
app.auth.allow-dev-bypass=true

# Google Gemini API Config
app.gemini.api-key=${GEMINI_API_KEY:}

# Google OAuth2 Client Config
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:715884971941-c2s7iflc33el3c7ova61nrvho7pcufi3.apps.googleusercontent.com}

