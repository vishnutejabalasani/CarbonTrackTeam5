spring.application.name=carbontrack-backend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/carbontrackdb?stringtype=unspecified
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:Vishnu@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configurations
app.jwt.secret=${JWT_SECRET:CarbonTrackSecretKeyCarbonTrackSecretKey12345}
app.jwt.expiration-ms=86400000

# Flyway
spring.flyway.baseline-on-migrate=true
# Security Logging
logging.level.org.springframework.security=DEBUG

# Redis Connection Configurations
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# Enable developer login bypass locally
app.auth.allow-dev-bypass=true

# Google Gemini API Config
app.gemini.api-key=${GEMINI_API_KEY:}
